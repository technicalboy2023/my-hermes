name: Keep Space Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://aman4899-hermes-v2.hf.space/health" || echo "000")
          echo "Health check returned: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Space is alive"
          else
            echo "⚠️ Space returned status $STATUS"
          fi
