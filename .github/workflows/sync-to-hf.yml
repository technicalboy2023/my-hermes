name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HF_SPACE_URL: "https://huggingface.co/spaces/aman4899/hermes-v2"

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: hf-mirror
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space (with retry)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add space "https://aman4899:${HF_TOKEN}@huggingface.co/spaces/aman4899/hermes-v2"
          REF="$(git rev-parse HEAD):refs/heads/main"
          MAX_RETRIES=5
          DELAY=15
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Push attempt $i/$MAX_RETRIES..."
            if git push --force space "$REF" 2>&1; then
              echo "Push succeeded on attempt $i."
              break
            else
              rc=$?
              if [ $i -lt $MAX_RETRIES ]; then
                echo "Push failed (exit $rc). Retrying in ${DELAY}s..."
                sleep "$DELAY"
                DELAY=$((DELAY * 2))
              else
                echo "Push failed after $MAX_RETRIES attempts."
                exit $rc
              fi
            fi
          done

      - name: Trigger HF Space Rebuild
        # Hugging Face auto-builds on push, but this ensures a rebuild even if
        # the git push was deduplicated (same SHA as last build).
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Triggering rebuild via HF API..."
          curl -fsS -X POST \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://huggingface.co/api/spaces/aman4899/hermes-v2/restart" \
            || echo "Restart API call failed (non-critical)."

      - name: Report
        if: always()
        run: |
          echo "✅ Synced $(git rev-parse --short HEAD) → $HF_SPACE_URL"
