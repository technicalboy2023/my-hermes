name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: hf-mirror
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add space "https://aman4899:${HF_TOKEN}@huggingface.co/spaces/aman4899/hermes-v2"
          git push --force space "$(git rev-parse HEAD):refs/heads/main"
      - name: Report
        if: always()
        run: |
          echo "✅ Synced $(git rev-parse --short HEAD) → https://huggingface.co/spaces/aman4899/hermes-v2"
